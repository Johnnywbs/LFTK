# Este ConfigMap e criado automaticamente pelo setup-master.sh
# com os IPs reais dos nodes apos o worker entrar no cluster.
#
# Para recriar manualmente:
#
# kubectl create configmap lft-vxlan-config \
#   --from-literal=master-ip="<IP Tailscale do Lenovo>" \
#   --from-literal=worker-ip="<IP Tailscale do Destroyer>" \
#   --from-literal=vxlan-id="100" \
#   --from-literal=vxlan-port="4789" \
#   --from-literal=vxlan-dev="lft-vxlan" \
#   --from-literal=bridge-dev="lft-vxbr" \
#   --from-literal=vxlan-mtu="1230" \
#   --from-literal=pod-subnet="10.20.0.0/24" \
#   --dry-run=client -o yaml | kubectl apply -f -
#
# Parametros:
#   vxlan-id   : VNI do tunnel (100 — nao usar 1, reservado pelo Flannel)
#   vxlan-port : porta UDP do VXLAN (4789 padrao)
#   vxlan-mtu  : Tailscale MTU (1280) - overhead VXLAN/UDP/IP (50) = 1230
#   pod-subnet : subnet Multus, isolada do Flannel (10.42.0.0/16)
