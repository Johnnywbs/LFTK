apiVersion: v1
kind: Pod
metadata:
  name: lft-iperf-server-vxlan
  labels:
    app: iperf-server-vxlan
  annotations:
    # IP fixo via Whereabouts — elimina ambiguidade de ordem de alocacao
    k8s.v1.cni.cncf.io/networks: '[{
      "name": "lft-multus-vxlan",
      "ips": ["10.20.0.10/24"]
    }]'
spec:
  nodeName: jonathas-santos-lenovo-ideapad-s145-15iwl
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command: ['iperf3', '-s']
    ports:
    - containerPort: 5201
---
apiVersion: v1
kind: Pod
metadata:
  name: lft-iperf-client-vxlan
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{
      "name": "lft-multus-vxlan",
      "ips": ["10.20.0.11/24"]
    }]'
spec:
  restartPolicy: Never
  nodeName: destroyer-vpceg17fb
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command:
    - sh
    - -c
    - |
      echo "=== Interfaces (validacao Multus) ==="
      ip addr show
      echo ""
      echo "Aguardando servidor iperf em 10.20.0.10:5201..."
      until iperf3 -c 10.20.0.10 -t 1 > /dev/null 2>&1; do
        sleep 2
      done
      echo "Servidor pronto. Iniciando medicao de 30s via Multus (net1)..."
      iperf3 -c 10.20.0.10 -B 10.20.0.11 -t 30 -J > /results/iperf_report_vxlan.json
      echo "=== Resultado ==="
      cat /results/iperf_report_vxlan.json | grep -E '"bits_per_second"|"rtt"' | head -5
      echo "Arquivo completo em /results/iperf_report_vxlan.json"
    volumeMounts:
    - name: results
      mountPath: /results
  volumes:
  - name: results
    persistentVolumeClaim:
      claimName: lft-results-pvc
