apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: lft-multus-vxlan
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "lft-multus-vxlan",
    "type": "bridge",
    "bridge": "lft-vxbr",
    "mtu": 1230,
    "ipam": {
      "type": "whereabouts",
      "range": "10.20.0.0/24",
      "exclude": [
        "10.20.0.0/32",
        "10.20.0.255/32"
      ]
    }
  }'
