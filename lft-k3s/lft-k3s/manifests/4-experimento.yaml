apiVersion: v1
kind: Service
metadata:
  name: lft-iperf-service
spec:
  selector:
    app: iperf-server
  ports:
  - protocol: TCP
    port: 5201
    targetPort: 5201
---
apiVersion: v1
kind: Pod
metadata:
  name: lft-iperf-server
  labels:
    app: iperf-server
spec:
  nodeName: jonathas-santos-lenovo-ideapad-s145-15iwl
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command: ['iperf3', '-s']
    ports:
    - containerPort: 5201
---
apiVersion: v1
kind: Pod
metadata:
  name: lft-iperf-client
spec:
  restartPolicy: Never
  nodeName: destroyer-vpceg17fb
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command:
    - sh
    - -c
    - |
      echo "Aguardando iperf-server (lft-iperf-service:5201)..."
      until iperf3 -c lft-iperf-service -t 1 > /dev/null 2>&1; do
        sleep 2
      done
      echo "Servidor pronto. Iniciando medicao de 30s..."
      iperf3 -c lft-iperf-service -t 30 -J > /results/iperf_report.json
      echo "=== Resultado ==="
      cat /results/iperf_report.json | grep -E '"bits_per_second"|"rtt"' | head -5
      echo "Arquivo completo em /results/iperf_report.json"
    volumeMounts:
    - name: results
      mountPath: /results
  volumes:
  - name: results
    persistentVolumeClaim:
      claimName: lft-results-pvc
