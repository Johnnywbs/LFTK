apiVersion: v1
kind: Service
metadata:
  name: lft-iperf-service
spec:
  selector:
    app: iperf-server
  ports:
    - protocol: TCP
      port: 5201
      targetPort: 5201
---
apiVersion: v1
kind: Pod
metadata:
  name: lft-iperf-server
  labels:
    app: iperf-server
spec:
  hostNetwork: true
  nodeName: jonathas-santos-lenovo-ideapad-s145-15iwl
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command: ['iperf3', '-s']
---
apiVersion: v1
kind: Pod
metadata:
  name: lft-iperf-client
spec:
  restartPolicy: Never
  hostNetwork: true
  nodeName: destroyer-vpceg17fb
  containers:
  - name: iperf
    image: networkstatic/iperf3
    command:
    - sh
    - -c
    - |
      while ! iperf3 -c 100.69.222.7 -t 1 > /dev/null 2>&1; do
        sleep 2
      done
      iperf3 -c 100.69.222.7 -J > /results/iperf_report.json
    volumeMounts:
    - name: results
      mountPath: /results
  volumes:
  - name: results
    persistentVolumeClaim:
      claimName: lft-results-pvc
