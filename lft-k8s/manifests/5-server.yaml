apiVersion: v1
kind: Service
metadata:
  name: lft-iperf-service
  namespace: lft
spec:
  selector:
    app: lft-iperf-server
  ports:
    - protocol: TCP
      port: 5201
      targetPort: 5201
---
apiVersion: v1
kind: Pod
metadata:
  name: lft-iperf-server
  namespace: lft
  labels:
    app: lft-iperf-server
  annotations:
    # Recebe IP do pool Whereabouts (primeiro a subir recebe 10.20.0.10)
    k8s.v1.cni.cncf.io/networks: '[{"name":"lft-vxlan","namespace":"lft"}]'
spec:
  nodeSelector:
    lft-role: worker
  containers:
    - name: iperf
      image: networkstatic/iperf3
      # Escuta em todas as interfaces — aceita conexões pelo net1 (VXLAN)
      command: ['iperf3', '-s']
      ports:
        - containerPort: 5201
          protocol: TCP
      securityContext:
        capabilities:
          add: ["NET_ADMIN"]
