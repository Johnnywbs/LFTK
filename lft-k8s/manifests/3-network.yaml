apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: lft-vxlan
  namespace: lft
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "lft-vxlan",
    "type": "macvlan",
    "master": "flannel.1",
    "mode": "bridge",
    "ipam": {
      "type": "whereabouts",
      "datastore": "kubernetes",
      "kubernetes": {
        "kubeconfig": "/etc/cni/net.d/whereabouts.kubeconfig"
      },
      "range": "10.20.0.0/24"
    }
  }'
