apiVersion: v1
kind: ConfigMap
metadata:
  name: lft-experiment-config
  namespace: lft
data:
  # Espelho do LFT: 6 snapshots, ímpares=normal, pares=degradado
  SNAPSHOT_COUNT: "6"
  ROTATE_S: "60"
  SERVER_IP: "10.20.0.10"

  # Link normal (snapshots 1, 3, 5) — equivalente ao link MG<->ES saudável do LFT
  NORMAL_DELAY: "10ms"
  NORMAL_JITTER: "1ms"
  NORMAL_RATE: "35mbit"

  # Link degradado (snapshots 2, 4, 6) — equivalente à degradação do LFT
  DEGRADED_DELAY: "130ms"
  DEGRADED_JITTER: "1ms"
  DEGRADED_RATE: "3mbit"

  # Modo de perturbação: "degrade" ou "take-down"
  # degrade   → tc netem com atraso e rate limitado
  # take-down → ip link set net1 down/up
  HINDERING: "degrade"
